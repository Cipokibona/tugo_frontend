<nav class="nav-shell">
  <div class="nav-bar-inner">
    <div class="brand-block">
      <img src="/logo_tugo_white.svg" alt="Tugo" class="brand-logo">
      <div>
        <div class="brand-title">Tugo</div>
      </div>
    </div>

    <button
      class="menu-toggle"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarToggleExternalContent"
      aria-controls="navbarToggleExternalContent"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <i class="fa fa-bars"></i>
    </button>
  </div>
</nav>

<div class="collapse" id="navbarToggleExternalContent">
  <div class="menu-panel">
    <div class="language-row">
      <label for="language-select">{{ 'language.label' | t }}</label>
      <select
        id="language-select"
        class="language-select"
        [value]="languageService.currentLanguage"
        (change)="onLanguageChange($event)"
      >
        <option value="en">{{ 'language.english' | t }}</option>
        <option value="fr">{{ 'language.french' | t }}</option>
      </select>
    </div>

    <div class="menu-grid">
      <a
        class="menu-link"
        [routerLink]="['/home']"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        data-bs-toggle="collapse"
        data-bs-target="#navbarToggleExternalContent"
      >
        <i class="fa fa-house"></i>
        <span>{{ 'nav.home' | t }}</span>
      </a>

      <a
        class="menu-link"
        [routerLink]="['/notifications']"
        routerLinkActive="active"
        data-bs-toggle="collapse"
        data-bs-target="#navbarToggleExternalContent"
      >
        <i class="fa fa-bell"></i>
        <span class="d-inline-flex align-items-center gap-2">
          <span>{{ 'nav.notifications' | t }}</span>
          @if(unreadNotificationsCount > 0) {
            <span class="badge rounded-pill text-bg-danger">{{ unreadNotificationsCount }}</span>
          }
        </span>
      </a>

      <a
        class="menu-link"
        [routerLink]="['/taxi']"
        routerLinkActive="active"
        data-bs-toggle="collapse"
        data-bs-target="#navbarToggleExternalContent"
      >
        <i class="fa fa-taxi"></i>
        <span>{{ 'nav.taxi' | t }}</span>
      </a>

      <a
        class="menu-link"
        [routerLink]="['/account']"
        routerLinkActive="active"
        data-bs-toggle="collapse"
        data-bs-target="#navbarToggleExternalContent"
      >
        <i class="fa fa-user-gear"></i>
        <span>{{ 'nav.my_account' | t }}</span>
      </a>

      <!--
      <a
        class="menu-link"
        [routerLink]="['/home']"
        [queryParams]="{ tab: 'USER' }"
        routerLinkActive="active"
        data-bs-toggle="collapse"
        data-bs-target="#navbarToggleExternalContent"
      >
        <i class="fa fa-car"></i>
        <span>My ride</span>
      </a>
      -->

      <a
        class="menu-link"
        [routerLink]="['/about-us']"
        routerLinkActive="active"
        data-bs-toggle="collapse"
        data-bs-target="#navbarToggleExternalContent"
      >
        <i class="fa fa-address-card"></i>
        <span>{{ 'nav.contact' | t }}</span>
      </a>
    </div>

    <button class="logout-btn" (click)="logout()">
      <i class="fa fa-right-from-bracket"></i>
      <span>{{ 'nav.logout' | t }}</span>
    </button>
  </div>
</div>
